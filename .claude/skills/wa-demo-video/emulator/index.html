<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>WhatsApp Emulator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="wa-phone-frame">
    <!-- Android Status Bar -->
    <div class="wa-status-bar">
      <div class="wa-status-bar-left">
        <span class="wa-status-time" id="statusBarTime">23:52</span>
      </div>
      <div class="wa-status-bar-right">
        <!-- Network signal (4 bars) -->
        <svg class="wa-status-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2 22h3V10H2v12zm5 0h3V7H7v15zm5 0h3V4h-3v18zm5 0h3V1h-3v21z" opacity="0.9"/>
        </svg>
        <span class="wa-status-text">LTE</span>
        <!-- WiFi -->
        <svg class="wa-status-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z" opacity="0.9"/>
        </svg>
        <!-- Battery percentage -->
        <span class="wa-status-text">85%</span>
        <div class="wa-battery-icon">
          <div class="wa-battery-body">
            <div class="wa-battery-fill" style="width:85%"></div>
          </div>
          <div class="wa-battery-tip"></div>
        </div>
      </div>
    </div>

    <!-- WhatsApp Chat Header -->
    <div class="wa-header">
      <div class="wa-header-left">
        <button class="wa-icon-btn wa-back-btn" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <div class="wa-header-avatar">
          <img id="headerAvatar" src="" alt="">
        </div>
        <div class="wa-header-info">
          <span class="wa-header-name" id="headerName">Business Name</span>
          <span class="wa-header-status online" id="headerStatus">online</span>
        </div>
      </div>
      <div class="wa-header-actions">
        <button class="wa-icon-btn" aria-label="Video call">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
        </button>
        <button class="wa-icon-btn" aria-label="Voice call">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
          </svg>
        </button>
        <button class="wa-icon-btn" aria-label="More options">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="2"/>
            <circle cx="12" cy="12" r="2"/>
            <circle cx="12" cy="19" r="2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="wa-chat" id="chatArea">
      <!-- Encryption Notice -->
      <div class="wa-encryption-notice">
        <svg class="encrypt-icon" viewBox="0 0 24 24" width="11" height="11" fill="currentColor">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
        </svg>
        As mensagens e ligações são protegidas com criptografia de ponta a ponta. Ninguém fora deste chat, nem mesmo o WhatsApp, pode lê-las ou ouvi-las. <strong>Saiba mais</strong>
      </div>
      <!-- Messages inserted by app.js -->
    </div>

    <!-- Input Row -->
    <div class="wa-input-row" id="inputRow">
      <div class="wa-input-box">
        <button class="wa-input-icon wa-emoji-btn" aria-label="Emoji">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
          </svg>
        </button>
        <textarea id="messageInput" placeholder="Mensagem" rows="1"></textarea>
        <button class="wa-input-icon wa-attach-btn" aria-label="Attach">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M1.816 15.556v.002c0 1.502.584 2.912 1.646 3.972s2.472 1.647 3.974 1.647a5.58 5.58 0 003.972-1.645l9.547-9.548c.769-.768 1.147-1.767 1.058-2.817-.079-.968-.548-1.927-1.319-2.698-1.594-1.592-4.068-1.711-5.517-.262l-7.916 7.915c-.881.881-.792 2.25.214 3.261.501.501 1.134.792 1.74.792.474 0 .926-.19 1.303-.574l6.236-6.241a.654.654 0 00-.925-.925L9.584 14.6a.974.974 0 01-.686.275c-.236 0-.501-.138-.762-.4-.741-.741-.729-1.357-.068-2.018l7.917-7.917c.932-.929 2.643-.842 3.818.333.576.577.879 1.225.929 1.878.058.732-.222 1.398-.787 1.964l-9.548 9.549a4.263 4.263 0 01-3.038 1.263c-1.143 0-2.216-.446-3.024-1.253a4.263 4.263 0 01-1.253-3.024c0-1.146.446-2.22 1.254-3.028l7.849-7.849a.654.654 0 00-.927-.926l-7.849 7.85A5.564 5.564 0 001.816 15.556z"/>
          </svg>
        </button>
        <button class="wa-input-icon wa-camera-btn" aria-label="Camera" id="cameraBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/>
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
          </svg>
        </button>
      </div>

      <!-- Action button (Mic/Send) -->
      <button class="wa-action-btn" id="actionBtn" aria-label="Voice Message or Send">
        <svg class="mic-icon visible" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg class="send-icon hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

    <!-- Android Gesture Bar (Android 14+) -->
    <div class="wa-nav-bar">
      <div class="wa-gesture-bar"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
